<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>새문안교회 출석 기록</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #ffffff;
  --bg2: #f5f5f3;
  --bg3: #eeede9;
  --text: #1a1a18;
  --text2: #6b6b67;
  --text3: #9e9e9a;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.2);
  --teal: #1D9E75;
  --teal-bg: #E1F5EE;
  --teal-text: #085041;
  --blue: #378ADD;
  --red: #E24B4A;
  --red-bg: #FCEBEB;
  --red-text: #A32D2D;
  --radius: 12px;
  --radius-sm: 8px;
  --nav-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --bg2: #262624;
    --bg3: #111110;
    --text: #f0f0ee;
    --text2: #a0a09c;
    --text3: #6a6a66;
    --border: rgba(255,255,255,0.09);
    --border2: rgba(255,255,255,0.18);
    --teal-bg: #04342C;
    --teal-text: #9FE1CB;
    --red-bg: #501313;
    --red-text: #F7C1C1;
  }
}

html, body {
  height: 100%;
  background: var(--bg3);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
  font-size: 16px;
  line-height: 1.5;
  overscroll-behavior: none;
}

/* ── 바텀 탭 네비 ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom));
  background: var(--bg);
  border-top: 0.5px solid var(--border);
  display: flex;
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: none;
  cursor: pointer;
  padding-bottom: var(--safe-bottom);
  color: var(--text3);
  font-size: 11px;
}
.nav-btn.active { color: var(--teal); }
.nav-icon {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-icon svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* ── 스크롤 컨테이너 ── */
.pages { height: 100vh; overflow: hidden; }
.page {
  display: none;
  height: 100vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 1rem);
}
.page.active { display: block; }

/* ── 상단 헤더 ── */
.page-header {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  padding: 14px 16px 12px;
  z-index: 10;
}
.page-header h1 { font-size: 17px; font-weight: 600; color: var(--text); }
.page-header p { font-size: 12px; color: var(--text3); margin-top: 1px; }

/* ── 공통 패딩 ── */
.content { padding: 16px; }

/* ── 카드 ── */
.card {
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 0.5px solid var(--border);
}

/* ── 폼 요소 ── */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 5px;
  font-weight: 500;
}
input[type=date],
input[type=month],
input[type=number],
input[type=text],
select {
  width: 100%;
  font-size: 16px; /* iOS 줌 방지 */
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 0.5px solid var(--border2);
  background: var(--bg2);
  color: var(--text);
  outline: none;
  appearance: none;
  -webkit-appearance: none;
}
input:focus, select:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── 울 그리드 ── */
.wool-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.wool-field label {
  font-size: 12px;
  color: var(--text2);
  display: block;
  margin-bottom: 5px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.wool-field input {
  font-size: 16px;
  padding: 11px 12px;
}

/* ── 버튼 ── */
.btn-primary {
  width: 100%;
  padding: 15px;
  background: var(--teal);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: -0.2px;
  margin-top: 4px;
}
.btn-primary:active { opacity: 0.82; transform: scale(0.99); }

.btn-ghost {
  padding: 10px 16px;
  background: none;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text2);
  cursor: pointer;
}
.btn-ghost:active { background: var(--bg2); }

.btn-danger-ghost {
  padding: 10px 14px;
  background: none;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text3);
  cursor: pointer;
  flex-shrink: 0;
}
.btn-danger-ghost:active { background: var(--red-bg); color: var(--red-text); border-color: var(--red); }

/* ── 토스트 ── */
.toast-wrap {
  position: fixed;
  top: 16px; left: 16px; right: 16px;
  z-index: 500;
  pointer-events: none;
}
.toast {
  display: none;
  padding: 13px 16px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  text-align: center;
}
.toast.show { display: block; }
.toast.success { background: var(--teal); color: white; }
.toast.deleted { background: var(--red); color: white; }

/* ── 목록 ── */
.filter-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
}
.filter-row input[type=month] { flex: 1; font-size: 15px; }

.log-item {
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.log-info { flex: 1; min-width: 0; cursor: pointer; }
.log-date { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.log-nums { font-size: 13px; color: var(--text2); }
.log-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── 빈 상태 ── */
.empty {
  text-align: center;
  padding: 48px 16px;
  color: var(--text3);
  font-size: 14px;
}

/* ── 모달 ── */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300;
  align-items: flex-end;
  justify-content: center;
}
.modal-bg.open { display: flex; }

/* 바텀 시트 스타일 */
.sheet {
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  padding: 8px 20px calc(20px + var(--safe-bottom));
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
}
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 4px auto 16px;
}
.sheet-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.sheet-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
.sheet-btns { display: flex; gap: 10px; margin-top: 8px; }
.sheet-cancel {
  flex: 1; padding: 14px;
  background: var(--bg2); border: none;
  border-radius: var(--radius-sm);
  font-size: 15px; color: var(--text2); cursor: pointer; font-weight: 500;
}
.sheet-del {
  flex: 1; padding: 14px;
  background: var(--red); border: none;
  border-radius: var(--radius-sm);
  font-size: 15px; color: white; cursor: pointer; font-weight: 600;
}

/* 상세 시트 */
.stat2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.stat-box { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 14px; }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.stat-val { font-size: 22px; font-weight: 700; }
.wool-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.wool-row:last-child { border-bottom: none; }
.wool-row span:last-child { font-weight: 600; }

/* ── 대시보드 ── */
.period-chips {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 2px;
  margin-bottom: 14px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.period-chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 999px;
  border: 0.5px solid var(--border2);
  background: var(--bg2);
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
}
.chip.active {
  background: var(--teal);
  border-color: var(--teal);
  color: white;
  font-weight: 600;
}

.metric-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 14px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.metric-scroll::-webkit-scrollbar { display: none; }
.metric {
  flex-shrink: 0;
  min-width: 130px;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.m-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; }
.m-val { font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.m-sub { font-size: 11px; color: var(--text3); }
.m-up { color: var(--teal); font-size: 11px; margin-top: 3px; }
.m-down { color: var(--red); font-size: 11px; margin-top: 3px; }

.chart-card {
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.chart-label { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.chart-sub { font-size: 11px; color: var(--text3); margin-bottom: 12px; }
.legend { display: flex; gap: 14px; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

.wool-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.wool-name { font-size: 12px; color: var(--text2); width: 72px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wool-bar-bg { flex: 1; background: var(--bg2); border-radius: 4px; height: 10px; overflow: hidden; }
.wool-bar-fill { height: 100%; border-radius: 4px; background: var(--teal); }
.wool-num { font-size: 12px; font-weight: 600; min-width: 34px; text-align: right; }
</style>
</head>
<body>

<div class="toast-wrap">
  <div id="toast" class="toast"></div>
</div>

<!-- ── 페이지들 ── -->
<div class="pages">

  <!-- 기록 입력 -->
  <div id="page-record" class="page active">
    <div class="page-header">
      <h1>기록 입력</h1>
      <p>새문안교회 출석 기록</p>
    </div>
    <div class="content">
      <div class="card">
        <div class="field">
          <label>날짜</label>
          <input type="date" id="input-date" />
        </div>
        <div class="grid-2">
          <div class="field">
            <label>예배 참석</label>
            <input type="number" id="worship" placeholder="0" min="0" inputmode="numeric" />
          </div>
          <div class="field">
            <label>집회 참석</label>
            <input type="number" id="meeting" placeholder="0" min="0" inputmode="numeric" />
          </div>
        </div>
        <div class="field">
          <label>기록자</label>
          <input type="text" id="recorder" placeholder="이름을 입력하세요" />
        </div>
      </div>

      <div class="card">
        <div class="card-title">울 별 참석 인원</div>
        <div class="wool-grid" id="wool-inputs"></div>
      </div>

      <button class="btn-primary" onclick="saveRecord()">저장하기</button>
    </div>
  </div>

  <!-- 기록 목록 -->
  <div id="page-list" class="page">
    <div class="page-header">
      <h1>기록 목록</h1>
      <p id="list-count"></p>
    </div>
    <div class="content">
      <div class="filter-row">
        <input type="month" id="filter-month" onchange="renderList()" />
        <button class="btn-ghost" onclick="document.getElementById('filter-month').value=''; renderList()">전체</button>
      </div>
      <div id="log-list"></div>
    </div>
  </div>

  <!-- 대시보드 -->
  <div id="page-dashboard" class="page">
    <div class="page-header">
      <h1>대시보드</h1>
      <p id="dash-period-label"></p>
    </div>
    <div class="content">
      <div class="period-chips" id="period-chips">
        <button class="chip" onclick="setChip(4,this)">4주</button>
        <button class="chip active" onclick="setChip(8,this)">8주</button>
        <button class="chip" onclick="setChip(12,this)">12주</button>
        <button class="chip" onclick="setChip(24,this)">24주</button>
        <button class="chip" onclick="setChip(9999,this)">전체</button>
      </div>

      <div class="metric-scroll" id="dash-metrics"></div>

      <div class="chart-card">
        <div class="chart-label">예배 · 집회 추이</div>
        <div class="chart-sub" id="chart-period-sub"></div>
        <div class="legend">
          <span class="legend-item"><span class="legend-dot" style="background:#378ADD"></span>예배</span>
          <span class="legend-item"><span class="legend-dot" style="background:#1D9E75"></span>집회</span>
        </div>
        <div style="position:relative;width:100%;height:200px;">
          <canvas id="trendChart" role="img" aria-label="주차별 예배 및 집회 인원 추이"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-label">울 별 평균 참석</div>
        <div class="chart-sub">평균 내림차순</div>
        <div id="wool-bars"></div>
      </div>
    </div>
  </div>

</div>

<!-- 바텀 탭 네비 -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-record" onclick="switchPage('record')">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M11 4H6a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </span>
    기록
  </button>
  <button class="nav-btn" id="nav-list" onclick="switchPage('list')">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </span>
    목록
  </button>
  <button class="nav-btn" id="nav-dashboard" onclick="switchPage('dashboard')">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </span>
    대시보드
  </button>
</nav>

<!-- 삭제 확인 시트 -->
<div id="confirm-sheet" class="modal-bg" onclick="sheetBgClick(event,'confirm-sheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">기록을 삭제할까요?</div>
    <div class="sheet-sub" id="confirm-desc"></div>
    <div class="sheet-btns">
      <button class="sheet-cancel" onclick="closeSheet('confirm-sheet')">취소</button>
      <button class="sheet-del" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<!-- 상세 보기 시트 -->
<div id="detail-sheet" class="modal-bg" onclick="sheetBgClick(event,'detail-sheet')">
  <div class="sheet" style="max-height:85vh">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="detail-title"></div>
    <div id="detail-body"></div>
  </div>
</div>

<script>
const WOOLS = ['새가족반','김보연울','이수인울','손동호울','김지인울','주지은울','최민정울','정충만울','배주희울','이승주울','이련경울','양승연울','이승은울'];
const STORAGE_KEY = 'saemunaan-records';
let records = [];
let pendingDeleteDate = null;
let trendChartInst = null;
let currentChipN = 8;

/* ── Storage ── */
const store = {
  async get(key) {
    if (window.storage) {
      try { const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : null; } catch(e) {}
    }
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch(e) { return null; }
  },
  async set(key, val) {
    if (window.storage) {
      try { await window.storage.set(key, JSON.stringify(val), true); return; } catch(e) {}
    }
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  }
};

async function load() {
  const data = await store.get(STORAGE_KEY);
  records = Array.isArray(data) ? data : [];
  renderList();
  renderDash();
}

/* ── 네비 ── */
function switchPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  if (id === 'dashboard') renderDash();
  if (id === 'list') renderList();
}

/* ── 시트 ── */
function openSheet(id) { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function sheetBgClick(e, id) { if (e.target === document.getElementById(id)) closeSheet(id); }

/* ── 토스트 ── */
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── 울 인풋 ── */
function renderWoolInputs() {
  document.getElementById('wool-inputs').innerHTML = WOOLS.map(w =>
    `<div class="wool-field">
      <label title="${w}">${w}</label>
      <input type="number" id="wool-${w}" placeholder="0" min="0" inputmode="numeric" />
    </div>`
  ).join('');
}

function clearForm() {
  document.getElementById('worship').value = '';
  document.getElementById('meeting').value = '';
  document.getElementById('recorder').value = '';
  WOOLS.forEach(w => { const el = document.getElementById('wool-'+w); if (el) el.value = ''; });
}

/* ── 저장 ── */
async function saveRecord() {
  const date = document.getElementById('input-date').value;
  if (!date) { alert('날짜를 선택해주세요'); return; }
  const worship = parseInt(document.getElementById('worship').value) || 0;
  const meeting = parseInt(document.getElementById('meeting').value) || 0;
  const recorder = document.getElementById('recorder').value.trim() || '미기재';
  const woolData = {};
  WOOLS.forEach(w => { woolData[w] = parseInt(document.getElementById('wool-'+w)?.value) || 0; });
  const idx = records.findIndex(r => r.date === date);
  const record = { date, worship, meeting, woolData, recorder, updatedAt: new Date().toISOString() };
  if (idx >= 0) records[idx] = record; else records.push(record);
  records.sort((a, b) => b.date.localeCompare(a.date));
  await store.set(STORAGE_KEY, records);
  showToast('저장되었습니다!', 'success');
  clearForm();
  renderList();
}

/* ── 목록 ── */
function renderList() {
  const fm = document.getElementById('filter-month').value;
  const filtered = fm ? records.filter(r => r.date.startsWith(fm)) : records;
  document.getElementById('list-count').textContent = `${filtered.length}개의 기록`;
  const container = document.getElementById('log-list');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty">기록이 없습니다</div>';
    return;
  }
  container.innerHTML = filtered.map(r => {
    const woolTotal = Object.values(r.woolData || {}).reduce((a,b) => a+b, 0);
    const d = new Date(r.date + 'T00:00:00');
    const label = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
    return `<div class="log-item">
      <div class="log-info" onclick="showDetail('${r.date}')">
        <div class="log-date">${label}</div>
        <div class="log-nums">예배 ${r.worship}명 · 집회 ${r.meeting}명 · 울 ${woolTotal}명</div>
        <div class="log-sub">기록자: ${r.recorder}</div>
      </div>
      <button class="btn-danger-ghost" onclick="requestDelete('${r.date}')">삭제</button>
    </div>`;
  }).join('');
}

/* ── 삭제 ── */
function requestDelete(date) {
  pendingDeleteDate = date;
  const d = new Date(date + 'T00:00:00');
  document.getElementById('confirm-desc').textContent =
    `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 기록은 삭제 후 복구할 수 없습니다.`;
  openSheet('confirm-sheet');
}
async function confirmDelete() {
  if (!pendingDeleteDate) return;
  records = records.filter(r => r.date !== pendingDeleteDate);
  pendingDeleteDate = null;
  closeSheet('confirm-sheet');
  await store.set(STORAGE_KEY, records);
  showToast('삭제되었습니다', 'deleted');
  renderList();
  renderDash();
}

/* ── 상세 ── */
function showDetail(date) {
  const r = records.find(x => x.date === date);
  if (!r) return;
  const d = new Date(r.date + 'T00:00:00');
  document.getElementById('detail-title').textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  const woolTotal = Object.values(r.woolData || {}).reduce((a,b) => a+b, 0);
  document.getElementById('detail-body').innerHTML = `
    <div class="stat2">
      <div class="stat-box"><div class="stat-label">예배 참석</div><div class="stat-val">${r.worship}명</div></div>
      <div class="stat-box"><div class="stat-label">집회 참석</div><div class="stat-val">${r.meeting}명</div></div>
    </div>
    <div class="stat-box" style="margin-bottom:16px"><div class="stat-label">울 전체 합계</div><div class="stat-val">${woolTotal}명</div></div>
    <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">울 별 상세</div>
    ${WOOLS.map(w => `<div class="wool-row"><span style="color:var(--text2)">${w}</span><span>${r.woolData[w]||0}명</span></div>`).join('')}
    <div style="margin-top:12px;font-size:12px;color:var(--text3)">기록자: ${r.recorder}</div>
  `;
  openSheet('detail-sheet');
}

/* ── 대시보드 ── */
function setChip(n, el) {
  currentChipN = n;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderDash();
}

function getDashFiltered() {
  const sorted = [...records].sort((a,b) => b.date.localeCompare(a.date));
  const slice = currentChipN >= 9999 ? sorted : sorted.slice(0, currentChipN);
  return slice.sort((a,b) => a.date.localeCompare(b.date));
}

function avg(arr) { return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }

function renderDash() {
  const filtered = getDashFiltered();
  const n = filtered.length;

  if (!n) {
    document.getElementById('dash-period-label').textContent = '데이터가 없습니다';
    document.getElementById('dash-metrics').innerHTML = '';
    document.getElementById('chart-period-sub').textContent = '';
    document.getElementById('wool-bars').innerHTML = '<div class="empty" style="padding:24px 0">데이터가 없습니다</div>';
    if (trendChartInst) { trendChartInst.destroy(); trendChartInst = null; }
    return;
  }

  document.getElementById('dash-period-label').textContent = `${filtered[0].date} ~ ${filtered[n-1].date} · ${n}회`;
  document.getElementById('chart-period-sub').textContent = `${filtered[0].date} ~ ${filtered[n-1].date}`;

  const worships = filtered.map(r => r.worship);
  const meetings = filtered.map(r => r.meeting);
  const woolTotals = filtered.map(r => Object.values(r.woolData||{}).reduce((a,b)=>a+b,0));
  const avgW = avg(worships), avgM = avg(meetings), avgUl = avg(woolTotals);
  const maxW = Math.max(...worships), maxM = Math.max(...meetings);

  let cmpW = '', cmpM = '';
  if (n >= 4) {
    const h = Math.floor(n/2);
    const dw = avg(worships.slice(h)) - avg(worships.slice(0,h));
    const dm = avg(meetings.slice(h)) - avg(meetings.slice(0,h));
    const pw = Math.round(Math.abs(dw)/Math.max(avg(worships.slice(0,h)),1)*100);
    const pm = Math.round(Math.abs(dm)/Math.max(avg(meetings.slice(0,h)),1)*100);
    cmpW = `<div class="${dw>=0?'m-up':'m-down'}">${dw>=0?'▲':'▼'} ${pw}% 전반 대비</div>`;
    cmpM = `<div class="${dm>=0?'m-up':'m-down'}">${dm>=0?'▲':'▼'} ${pm}% 전반 대비</div>`;
  }

  document.getElementById('dash-metrics').innerHTML = `
    <div class="metric"><div class="m-label">평균 예배</div><div class="m-val">${avgW}</div><div class="m-sub">최고 ${maxW}명</div>${cmpW}</div>
    <div class="metric"><div class="m-label">평균 집회</div><div class="m-val">${avgM}</div><div class="m-sub">최고 ${maxM}명</div>${cmpM}</div>
    <div class="metric"><div class="m-label">울 평균 합계</div><div class="m-val">${avgUl}</div><div class="m-sub">${n}회 기준</div></div>
    <div class="metric"><div class="m-label">기록 횟수</div><div class="m-val">${n}</div><div class="m-sub">회</div></div>
  `;

  /* 차트 */
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const tickColor = isDark ? '#6a6a66' : '#9e9e9a';
  const labels = filtered.map(r => { const d = new Date(r.date+'T00:00:00'); return `${d.getMonth()+1}/${d.getDate()}`; });

  if (trendChartInst) { trendChartInst.destroy(); trendChartInst = null; }
  trendChartInst = new Chart(document.getElementById('trendChart').getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'예배', data: worships, borderColor:'#378ADD', backgroundColor:'rgba(55,138,221,0.07)', borderWidth:2, pointRadius: n>16?2:4, pointBackgroundColor:'#378ADD', tension:0.3, fill:true },
        { label:'집회', data: meetings, borderColor:'#1D9E75', backgroundColor:'rgba(29,158,117,0.07)', borderWidth:2, pointRadius: n>16?2:4, pointBackgroundColor:'#1D9E75', tension:0.3, fill:true, borderDash:[5,3] }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display:false },
        tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y}명` } }
      },
      scales: {
        x: { ticks:{ font:{size:10}, color:tickColor, autoSkip:true, maxTicksLimit:8 }, grid:{display:false}, border:{display:false} },
        y: { ticks:{ font:{size:10}, color:tickColor, callback: v => v+'명' }, grid:{color:gridColor}, border:{display:false} }
      }
    }
  });

  /* 울 바 */
  const woolAvg = WOOLS.map(w => ({ name:w, avg: avg(filtered.map(r=>(r.woolData||{})[w]||0)) })).sort((a,b)=>b.avg-a.avg);
  const maxAvg = woolAvg[0].avg || 1;
  document.getElementById('wool-bars').innerHTML = woolAvg.map(({name, avg:a}) =>
    `<div class="wool-bar-row">
      <span class="wool-name" title="${name}">${name}</span>
      <div class="wool-bar-bg"><div class="wool-bar-fill" style="width:${Math.round(a/maxAvg*100)}%"></div></div>
      <span class="wool-num">${a}명</span>
    </div>`
  ).join('');
}

/* ── 초기화 ── */
const today = new Date();
const pad = n => String(n).padStart(2,'0');
document.getElementById('input-date').value = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
renderWoolInputs();
load();
</script>
</body>
</html>
